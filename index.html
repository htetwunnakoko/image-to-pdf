<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Image to PDF Converter</title>
  <meta name="theme-color" content="#0f172a" />

  <link rel="stylesheet" href="style.css" />

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- SortableJS for manual drag reorder -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
</head>
<body>

  <div class="container">
    <div class="card">

      <div class="title-row">
        <h1 data-i18n="appTitle">Image to PDF Converter</h1>
        <span class="version-badge" id="appVersion">v1.0.0</span>
      </div>

      <p class="subtitle" data-i18n="subtitle">
        Image တွေ upload လုပ်ပြီး filename အလိုက် sort စီကာ PDF ပြောင်းပါ
      </p>

      <!-- Upload Area -->
      <label class="upload-box" id="dropZone">
        <input type="file" id="imageInput" accept="image/*" multiple />

        <span data-i18n="uploadText">
          📁 Click သို့မဟုတ် Drag & Drop Images
        </span>

        <small data-i18n="uploadHint">
          PNG, JPG, JPEG, WEBP စတဲ့ image files တွေ upload လုပ်နိုင်ပါတယ်
        </small>
      </label>

      <!-- Settings -->
      <div class="settings">

        <div>
          <label for="languageSelect" data-i18n="languageLabel">
            ဘာသာစကား
          </label>
          <select id="languageSelect">
            <option value="my" data-i18n="languageMyanmar">မြန်မာ</option>
            <option value="en" data-i18n="languageEnglish">English</option>
          </select>
        </div>

        <div>
          <label for="pdfMode" data-i18n="pdfModeLabel">
            PDF Mode
          </label>
          <select id="pdfMode">
            <option value="continuous" data-i18n="continuousMode">
              Continuous - ပုံတွေကို ပူးပြီးထုတ်မယ်
            </option>
            <option value="normal" data-i18n="normalMode">
              Normal - တစ်ပုံတစ်မျက်နှာ
            </option>
          </select>
        </div>

        <div>
          <label for="pageSize" data-i18n="pageSizeLabel">
            PDF Page Size
          </label>
          <select id="pageSize">
            <option value="a4" data-i18n="pageSizeA4">A4</option>
            <option value="letter" data-i18n="pageSizeLetter">Letter</option>
          </select>
        </div>

        <div>
          <label for="orientation" data-i18n="orientationLabel">
            Orientation
          </label>
          <select id="orientation">
            <option value="portrait" data-i18n="orientationPortrait">Portrait</option>
            <option value="landscape" data-i18n="orientationLandscape">Landscape</option>
          </select>
        </div>

        <div>
          <label for="imageQuality" data-i18n="imageQualityLabel">
            Image Quality
          </label>
          <select id="imageQuality">
            <option value="0.95" data-i18n="qualityHigh">High</option>
            <option value="0.85" selected data-i18n="qualityMedium">Medium</option>
            <option value="0.70" data-i18n="qualityLow">Low</option>
          </select>
        </div>

      </div>

      <!-- Action Buttons -->
      <div class="actions">
        <button id="sortBtn" data-i18n="sortBtn">
          Sort by File Name
        </button>

        <button id="convertBtn" data-i18n="convertBtn">
          Convert to PDF
        </button>

        <button id="clearBtn" class="danger" data-i18n="clearBtn">
          Clear All
        </button>
      </div>

      <!-- Status -->
      <p id="status">No images selected.</p>

      <!-- Preview -->
      <div class="preview-header">
        <h3 data-i18n="previewTitle">Images Preview</h3>

        <p data-i18n="previewHint">
          Card တွေကို drag ဆွဲပြီး manual reorder လုပ်နိုင်ပါတယ်။ PDF ထုတ်တဲ့အခါ ဒီ order အတိုင်းထွက်ပါမယ်။
        </p>
      </div>

      <div id="preview" class="preview"></div>

    </div>
  </div>

  <!-- PDF File Name Modal -->
  <div id="fileNameModal" class="modal hidden">
    <div class="modal-box">

      <h3 data-i18n="modalTitle">
        PDF File Name
      </h3>

      <p class="modal-text" data-i18n="modalText">
        PDF ထုတ်မယ့် file name ကို ပြင်နိုင်ပါတယ်။
      </p>

      <input
        type="text"
        id="pdfFileNameInput"
        placeholder="converted-images"
        data-i18n-placeholder="pdfFileNamePlaceholder"
        autocomplete="off"
      />

      <div class="modal-actions">
        <button id="confirmPdfBtn" data-i18n="confirmPdfBtn">
          Create PDF
        </button>

        <button id="cancelPdfBtn" class="danger" data-i18n="cancelPdfBtn">
          Cancel
        </button>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
